name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

# Annule les exécutions précédentes encore en cours sur la même réf
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  APP_NAME: BGRAPP_Pyconseil
  PYTHON_VERSION: '3.11'

jobs:
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget fuse libfuse2 || sudo apt-get install -y wget fuse libfuse2t64 || sudo apt-get install -y wget

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Install Python dependencies
        working-directory: ./build_config
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_build.txt

      - name: Build with PyInstaller (single file)
        working-directory: ./build_config
        run: pyinstaller --clean --noconfirm pyconseil.spec

      - name: Create AppImage structure
        working-directory: ./build_config
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp "dist/${APP_NAME}" "AppDir/usr/bin/"

          cat > "AppDir/usr/share/applications/pyconseil.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=BGRAPP Pyconseil
          Comment=Outil d'aide à la préparation des conseils de classe
          Exec=BGRAPP_Pyconseil
          Icon=pyconseil
          Categories=Education;Office;
          EOF

          ln -sf "usr/share/applications/pyconseil.desktop" AppDir/
          ln -sf "usr/bin/${APP_NAME}" AppDir/AppRun

          cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/pyconseil.png
          # appimagetool attend aussi une icône à la racine de l'AppDir
          cp icon.png AppDir/pyconseil.png

      - name: Build AppImage
        working-directory: ./build_config
        env:
          # Évite la dépendance à FUSE (souvent indisponible sur les runners)
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="$(date +%Y.%m.%d)-${GITHUB_SHA::8}"
          fi
          appimagetool AppDir "${APP_NAME}-${VERSION}-x86_64.AppImage"
          chmod +x "${APP_NAME}-${VERSION}-x86_64.AppImage"

      - name: Generate checksums
        working-directory: ./build_config
        run: |
          sha256sum "dist/${APP_NAME}" > "dist/${APP_NAME}.sha256"
          if ls ${APP_NAME}-*.AppImage 1> /dev/null 2>&1; then
            APPIMAGE_FILE=$(ls ${APP_NAME}-*.AppImage | head -n 1)
            sha256sum "${APPIMAGE_FILE}" > "${APPIMAGE_FILE}.sha256"
          fi

      - name: Upload Linux AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: |
            build_config/BGRAPP_Pyconseil-*.AppImage
            build_config/BGRAPP_Pyconseil-*.AppImage.sha256
          if-no-files-found: error
          retention-days: 90

  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        working-directory: ./build_config
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_build.txt

      - name: Build with PyInstaller (single file)
        working-directory: ./build_config
        run: pyinstaller --clean --noconfirm pyconseil.spec

      - name: Generate checksum
        working-directory: ./build_config
        run: certutil -hashfile dist\BGRAPP_Pyconseil.exe SHA256 > dist\BGRAPP_Pyconseil.exe.sha256

      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: |
            build_config/dist/BGRAPP_Pyconseil.exe
            build_config/dist/BGRAPP_Pyconseil.exe.sha256
          if-no-files-found: error
          retention-days: 90

  create-release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')

    steps:
      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: ./artifacts

      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: windows-executable
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            ### Téléchargements

            **Linux** : `BGRAPP_Pyconseil-*.AppImage` (rendre exécutable : `chmod +x`, puis lancer)

            **Windows** : `BGRAPP_Pyconseil.exe` (exécutable portable, fichier unique)

            ### Vérification d'intégrité

            Des fichiers `.sha256` accompagnent chaque binaire.

            ### Configuration

            Au premier lancement, placez un fichier `.env` (voir `env.example`) à côté de
            l'exécutable / de l'AppImage pour renseigner vos clés API.
          files: |
            ./artifacts/*.AppImage
            ./artifacts/*.AppImage.sha256
            ./artifacts/BGRAPP_Pyconseil.exe
            ./artifacts/BGRAPP_Pyconseil.exe.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
